name: Monthly Partnership Analysis

on:
  workflow_dispatch:
  schedule:
    # First Monday of each month at 07:00 CET (06:00 UTC)
    # Runs every Monday — script handles "first Monday" logic via date
    - cron: "0 6 1-7 * 1"

jobs:
  partnership-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run monthly partnership analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/partnership_analysis.py

      - name: Commit and push analysis file
        run: |
          git config user.name "JAKALA GTM OS"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intelligence/partnerships/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Monthly partnership analysis — $(date +%Y-%m)"
            git push
          fi
