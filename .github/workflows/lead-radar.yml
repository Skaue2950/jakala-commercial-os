name: Weekly Lead Radar

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:30 CET (05:30 UTC)
    - cron: "30 5 * * 1"

jobs:
  lead-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run lead radar (AI-powered)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/lead_radar.py

      - name: Commit radar file
        run: |
          git config user.name "JAKALA GTM OS"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add intelligence/daily-leads/
          git commit -m "Weekly lead radar — $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin main